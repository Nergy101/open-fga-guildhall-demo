<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 64 64"
  width="64"
  height="64"
  role="img"
  aria-label="GuildHall crest"
>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e293b" />
      <stop offset="1" stop-color="#0b1120" />
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc" />
      <stop offset="1" stop-color="#94a3b8" />
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fde68a" />
      <stop offset="0.5" stop-color="#f59e0b" />
      <stop offset="1" stop-color="#b45309" />
    </linearGradient>
  </defs>

  <!-- badge background -->
  <rect
    x="2"
    y="2"
    width="60"
    height="60"
    rx="15"
    fill="url(#bg)"
    stroke="#f59e0b"
    stroke-width="2.5"
  />

  <!-- crossed swords (splay into an X behind the shield) -->
  <g id="sword">
    <!-- blade -->
    <polygon points="32,5 34,10 34,40 30,40 30,10" fill="url(#steel)" />
    <!-- tip highlight -->
    <polygon points="32,5 34,10 30,10" fill="#f1f5f9" />
    <!-- crossguard -->
    <rect
      x="23"
      y="39.5"
      width="18"
      height="4"
      rx="2"
      fill="#fbbf24"
      stroke="#92400e"
      stroke-width="0.6"
    />
    <!-- grip -->
    <rect x="30.2" y="43.5" width="3.6" height="11" rx="1" fill="#7c2d12" />
    <!-- pommel -->
    <circle
      cx="32"
      cy="56"
      r="3"
      fill="#fbbf24"
      stroke="#92400e"
      stroke-width="0.6"
    />
  </g>
  <use href="#sword" transform="rotate(42 32 32)" />
  <use href="#sword" transform="rotate(-42 32 32)" />

  <!-- shield -->
  <path
    d="M32 20 L44 24 V34.5 C44 43 38.5 47.5 32 50.5 C25.5 47.5 20 43 20 34.5 V24 Z"
    fill="url(#gold)"
    stroke="#7c2d12"
    stroke-width="1.6"
    stroke-linejoin="round"
  />
  <path
    d="M32 23 L41 26 V34.5 C41 41 37 44.6 32 47 C27 44.6 23 41 23 34.5 V26 Z"
    fill="none"
    stroke="#fffbeb"
    stroke-opacity="0.55"
    stroke-width="1"
  />

  <!-- rune star -->
  <path
    d="M32 27 l2.1 4.5 4.9 0.5 -3.6 3.4 0.95 4.9 -4.35 -2.4 -4.35 2.4 0.95 -4.9 -3.6 -3.4 4.9 -0.5 Z"
    fill="#7c2d12"
  />
</svg>
