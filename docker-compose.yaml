name: guildhall

networks:
  openfga:

services:
  postgres:
    image: postgres:17
    container_name: guildhall-postgres
    networks:
      - openfga
    # Not published to the host: only OpenFGA talks to it (over the compose network).
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=openfga
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: openfga/openfga:latest
    container_name: guildhall-migrate
    command: migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - OPENFGA_DATASTORE_ENGINE=postgres
      - OPENFGA_DATASTORE_URI=postgres://postgres:password@postgres:5432/openfga?sslmode=disable
    networks:
      - openfga

  openfga:
    image: openfga/openfga:latest
    container_name: guildhall-openfga
    # Host-consistent addrs: the Playground tells the browser to call the API on
    # the server's own http port, so it must match the published host port.
    command: run --http-addr=0.0.0.0:8088 --grpc-addr=0.0.0.0:8089 --playground-enabled --playground-addr=0.0.0.0:4000
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      - OPENFGA_DATASTORE_ENGINE=postgres
      - OPENFGA_DATASTORE_URI=postgres://postgres:password@postgres:5432/openfga?sslmode=disable
      - OPENFGA_LOG_FORMAT=json
      # Cache check sub-results so the dashboard's many overlapping checks hit
      # memory instead of re-querying Postgres on every page load.
      - OPENFGA_CHECK_QUERY_CACHE_ENABLED=true
      - OPENFGA_CHECK_QUERY_CACHE_TTL=30s
      - OPENFGA_CHECK_ITERATOR_CACHE_ENABLED=true
    networks:
      - openfga
    ports:
      # 8080/8081 are taken by an ssh tunnel here, so we use 8088/8089 on both
      # sides (host:container) — the Playground's browser-side API URL resolves.
      - "8088:8088" # HTTP API   -> http://localhost:8088
      - "8089:8089" # gRPC API
      - "4000:4000" # Playground -> http://localhost:4000/playground

  # Auto-seeds the "guildhall" store (model + tuples) once OpenFGA is up, so the
  # stack is always populated after `docker compose up` — no manual `deno task
  # seed`. Reuses the same Deno seeder; runs once and exits.
  seed:
    image: denoland/deno:latest
    container_name: guildhall-seed
    working_dir: /app
    user: root
    # Hermetic deno cache (own DENO_DIR volume) and --node-modules-dir=none so
    # the run ignores the host node_modules; deps resolve via the repo lockfile.
    entrypoint: [
      "deno",
      "run",
      "-A",
      "--node-modules-dir=none",
      "scripts/seed.ts",
    ]
    environment:
      - DENO_DIR=/deno-dir
      # Requests go over the compose network…
      - FGA_API_URL=http://openfga:8088
      # …but fga.local.json must point the host app/browser at the published port.
      - FGA_PUBLIC_URL=http://localhost:8088
    depends_on:
      openfga:
        condition: service_started
    restart: "no"
    volumes:
      - .:/app
      - guildhall-deno-cache:/deno-dir
    networks:
      - openfga

volumes:
  guildhall-deno-cache:
